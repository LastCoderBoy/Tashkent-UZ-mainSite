name: Tashkent UZ Test Suite

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    - cron: '0 6 * * *'   # nightly run at 06:00 UTC — catches site-side regressions

jobs:
  selenium-tests:
    name: Run Selenium Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # carry Allure history forward so Trend graph populates over time
      - name: Download previous Allure history
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-history
          path: target/allure-results/history

      - name: Run tests (headless)
        run: |
          mvn test \
            -Dheadless=true \
            -Dsurefire.failIfNoSpecifiedTests=false
        continue-on-error: true   # let report generate even when tests fail

      - name: Generate Allure report
        if: always()
        run: mvn allure:report -q

      - name: Write job summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/testng-results.xml ]; then
            PASSED=$(grep -o 'passed="[0-9]*"' target/surefire-reports/testng-results.xml | grep -o '[0-9]*' | head -1)
            FAILED=$(grep -o 'failed="[0-9]*"' target/surefire-reports/testng-results.xml | grep -o '[0-9]*' | head -1)
            SKIPPED=$(grep -o 'skipped="[0-9]*"' target/surefire-reports/testng-results.xml | grep -o '[0-9]*' | head -1)
            echo "| ✅ Passed  | $PASSED  |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed  | $FAILED  |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/
          retention-days: 14

      - name: Upload Allure history for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: target/site/allure-maven-plugin/history/
          retention-days: 30

      - name: Upload raw Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 14

      - name: Upload TestNG surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-results
          path: target/surefire-reports/
          retention-days: 14