name: Tashkent UZ Test Suite

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  selenium-tests:
    name: Run Selenium Tests
    runs-on: ubuntu-latest

    steps:

      # Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Build project
        run: mvn clean compile -q

      # -Dheadless=true is read by ChromeOptions in BaseTest.
      # Surefire picks up both TestNG test classes AND TestRunner automatically.
      - name: Run Selenium tests (headless)
        run: |
          mvn test \
            -Dheadless=true \
            -Dsurefire.failIfNoSpecifiedTests=false
        env:
          DISPLAY: :99

      # Generate Allure report
      - name: Generate Allure report
        if: always()
        run: mvn allure:report -q

      # Upload Allure HTML report
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/
          retention-days: 14

      # Upload raw Allure results
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 14

      # Upload TestNG surefire results
      - name: Upload TestNG results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-results
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: reports/screenshots/
          retention-days: 7